version: '3.8'

services:
  # ═══════════════════════════════════════════
  # Frontend (React + Vite + Nginx)
  # ═══════════════════════════════════════════
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

  # ═══════════════════════════════════════════
  # Backend (Node.js + Express)
  # ═══════════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      - JOB_NAME=backend
      - PORT=4000
    depends_on:
      - ai-service
    restart: always
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # ═══════════════════════════════════════════
  # AI Microservice (Python + FastAPI)
  # ═══════════════════════════════════════════
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
